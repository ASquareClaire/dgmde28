<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Component Demo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>  <!-- placeholder for React DOM -->
    
    <script type="text/babel">
   
   function ClickMe()
   {
     // EMBED INFO IN THE ATTRIBUTES TO USE IT LATER (Like to know what was clicked)
     var doclick= (e) => alert("clicked! Button text is " + e.target.value)
     return <button onClick={doclick} value="1">Click Me</button> 
   }
    
    var clicker = <ClickMe />
    const myroot = ReactDOM.createRoot(document.getElementById("root"));
    myroot.render(clicker);
    
    </script>
</body>
</html>
