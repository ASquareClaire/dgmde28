<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<!--github path: https://asquareclaire.github.io/dgmde28/ttt_v4.html-->
<style type="text/css">
	a { color: #000000; }
	body { 
		font-family:Constantia, "Lucida Bright", "DejaVu Serif", Georgia, "serif"; 
		text-align: center; 
	}
	button { 
		background: #A41034;
		border: 2px solid #000000; 
		border-radius: 5px;
		color: white;
		font-size: 25px;
		padding: 10px;
	}
	button:hover { background: #b6b6b6; }
	h1 { font-weight: bolder; }
	
	
	.board { 
		border: 5px solid #000000;
		margin: 20px auto;
		padding: 30px;
		width: 330px; 
	}
	.square { 
		border: 2px solid #000000;
		border-radius: 5px;
		color: #A41034;
		display: inline-block; 
		height: 100px;  
		font-family:Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif"; 
		font-size: 60px; 
		font-weight: 500;
		line-height: 100px;
		margin-bottom: 5px; 
		margin-right: 5px; 
		max-width: 100px;
		vertical-align: top;
		width: 100%;
	}
	.square:hover { background: #b6b6b6;}
	
	.row { 
		font-size: 0px;
		max-width: 600px; 
		width: 100%; 
	}
	#turn {
		border: 2px solid #000000;
		border-radius: 5px;
		color: #A41034;
		display: inline-block;
		padding-left: 10px;
		padding-right: 10px;
	}
</style>
	
<script>
	// Set up next turn
	function nextTurn()
	{
		if (turn == "X")
			turn = "O";
		else
			turn = "X";
		document.getElementById("turn").innerHTML = "<h2>" + turn + "'s Turn</h2>";
	}
	
	
	// When square is clicked
	function sqClick(i)
	{
		let sq = document.getElementById("sq" + i);
		// If square is already filled, return
		if (sq.innerHTML == "X" || sq.innerHTML == "O")
			return;
		sq.innerHTML = turn;
		nextTurn();
	}
	
	
	// Randomly decide first turn
	function firstTurn()
	{
		var n = Math.floor(Math.random() * 10);
		if (n % 2 == 0)
			turn = "X";
		else 
			turn = "O";
		//console.log("turn: " + turn);
		document.getElementById("turn").innerHTML = "<h2>" + turn + "'s Turn</h2>";
		return turn;
	}
	//console.log("turn: " + turn);
	
	
	var turn = "O";
	function startGame()
	{
		console.log("starting game");
		turn = firstTurn();
		
		// Add click handlers
		squares = document.getElementsByClassName("square");
		for (let i = 0; i < squares.length; i++)
		{
			squares[i].onclick = function() 
			{
				sqClick(i);
			}
		}
	}

</script>
	
<title>ttt_v4.html</title>
</head>

	
<body>
	<h1>Tic Tac Toe Game</h1>
	<div id="turn"><h2></h2></div>
	
<!--	Create board-->
	<div class="board">
		<script>
			const NUM_SQUARES = 9;
			for (i=0; i<NUM_SQUARES; i++)
			{
				id = "sq"+i;
				document.write( "<div class='square' id='" + id + "'></div>" );
			}	
		</script>
	</div>
	
<!--	Place letters in squares-->
	<script>
		document.getElementById("sq0").innerHTML = "O";
		document.getElementById("sq1").innerHTML = "X";
		document.getElementById("sq7").innerHTML = "X";
	</script>
							 
	<button>Start Game</button>
	<h2>
		<a href="https://www.exploratorium.edu/explore/puzzles/tictactoe" target="_blank">Rules</a>
	</h2>
	
	<script>
		startGame();
	</script>
</body>
</html>
